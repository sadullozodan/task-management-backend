# Render Blueprint — Docker web service.
# Reuses the EXISTING Render PostgreSQL database (already migrated), so no
# `databases:` block here. DATABASE_URL is entered manually (sync: false) — paste
# the database's *Internal Database URL* when Render prompts during Blueprint apply.
services:
  - type: web
    name: task-management-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3000
      - key: LOG_LEVEL
        value: info
      # Paste the EXISTING database's Internal Database URL here in the dashboard.
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: CORS_ORIGIN
        value: "*"
      - key: STORAGE_DRIVER
        value: local
      - key: STORAGE_PRESIGN_TTL
        value: 900
      - key: PUBLIC_BASE_URL
        value: https://task-management-api.onrender.com
      - key: ATTACHMENT_MAX_BYTES
        value: 26214400
      - key: LOCAL_STORAGE_DIR
        value: ./uploads
